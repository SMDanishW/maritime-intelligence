name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Backend: lint + test ──────────────────────────────────────────────────────
  backend-ci:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r backend/requirements-dev.txt
      - name: Lint
        run: ruff check backend/app/ backend/tests/
      - name: Test
        run: pytest backend/tests/ -v
        env:
          REDIS_URL: redis://localhost:6379/0
          DATABASE_URL: ""
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

  # ── Frontend: type-check + build ─────────────────────────────────────────────
  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npx tsc --noEmit
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  # ── Bootstrap: ECR + EKS cluster + ALB controller (skips if already exists) ──
  bootstrap:
    needs: [backend-ci, frontend-ci]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
      NODEGROUP_NAME: managed-workers
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install eksctl
        run: |
          curl -sLO "https://github.com/eksctl-io/eksctl/releases/latest/download/eksctl_Linux_amd64.tar.gz"
          tar -xzf eksctl_Linux_amd64.tar.gz
          sudo mv eksctl /usr/local/bin

      - name: Create ECR repos (idempotent)
        run: |
          aws ecr describe-repositories --repository-names marine-backend 2>/dev/null || \
            aws ecr create-repository --repository-name marine-backend
          aws ecr describe-repositories --repository-names marine-frontend 2>/dev/null || \
            aws ecr create-repository --repository-name marine-frontend

      - name: Create EKS cluster (skip if exists, no nodegroup)
        run: |
          if eksctl get cluster --name "$CLUSTER_NAME" --region "$AWS_REGION" 2>/dev/null; then
            echo "Cluster already exists — skipping"
          else
            eksctl create cluster \
              --name "$CLUSTER_NAME" \
              --region "$AWS_REGION" \
              --without-nodegroup
          fi

      - name: Ensure worker nodes are ready
        timeout-minutes: 60
        run: |
          set -euo pipefail
          aws eks update-kubeconfig --name "$CLUSTER_NAME" --region "$AWS_REGION"

          echo "=== Cluster status ==="
          aws eks describe-cluster --name "$CLUSTER_NAME" --region "$AWS_REGION" \
            --query "cluster.{status:status,version:version}" --output json

          echo "=== All managed nodegroups ==="
          aws eks list-nodegroups --cluster-name "$CLUSTER_NAME" --region "$AWS_REGION"

          EXISTS=$(aws eks list-nodegroups \
            --cluster-name "$CLUSTER_NAME" --region "$AWS_REGION" \
            --query "contains(nodegroups, '${NODEGROUP_NAME}')" \
            --output text 2>/dev/null || echo "False")
          echo "Nodegroup '${NODEGROUP_NAME}' exists: $EXISTS"

          if [ "$EXISTS" != "True" ]; then
            STACK_NAME="eksctl-${CLUSTER_NAME}-nodegroup-${NODEGROUP_NAME}"
            echo "=== Cleaning up any failed CF stack: $STACK_NAME ==="
            STACK_STATUS=$(aws cloudformation describe-stacks \
              --stack-name "$STACK_NAME" --region "$AWS_REGION" \
              --query "Stacks[0].StackStatus" --output text 2>/dev/null || echo "DOES_NOT_EXIST")
            echo "Stack status: $STACK_STATUS"

            if [[ "$STACK_STATUS" =~ ^(ROLLBACK_COMPLETE|CREATE_FAILED|ROLLBACK_FAILED|DELETE_FAILED)$ ]]; then
              echo "Removing termination protection and deleting failed stack..."
              aws cloudformation update-termination-protection \
                --stack-name "$STACK_NAME" --region "$AWS_REGION" \
                --no-enable-termination-protection 2>/dev/null || true
              aws cloudformation delete-stack \
                --stack-name "$STACK_NAME" --region "$AWS_REGION"
              aws cloudformation wait stack-delete-complete \
                --stack-name "$STACK_NAME" --region "$AWS_REGION"
              echo "Failed stack deleted."
            fi

            echo "Creating managed nodegroup '${NODEGROUP_NAME}'..."
            eksctl create nodegroup \
              --cluster "$CLUSTER_NAME" --region "$AWS_REGION" \
              --name "$NODEGROUP_NAME" \
              --node-type t3.micro \
              --nodes 2 --nodes-min 2 --nodes-max 2 \
              --managed \
              --timeout 60m || {
                echo "=== CloudFormation stack events ==="
                aws cloudformation describe-stack-events \
                  --stack-name "$STACK_NAME" --region "$AWS_REGION" \
                  --query "StackEvents[].[Timestamp,LogicalResourceId,ResourceStatus,ResourceStatusReason]" \
                  --output table 2>/dev/null || echo "stack events unavailable"

                echo "=== ManagedNodeGroup-specific events ==="
                aws cloudformation describe-stack-events \
                  --stack-name "$STACK_NAME" --region "$AWS_REGION" \
                  --query "StackEvents[?LogicalResourceId=='ManagedNodeGroup'].[Timestamp,ResourceStatus,ResourceStatusReason]" \
                  --output table 2>/dev/null || echo "no ManagedNodeGroup events"

                echo "=== EKS nodegroup health ==="
                aws eks describe-nodegroup \
                  --cluster-name "$CLUSTER_NAME" --nodegroup-name "$NODEGROUP_NAME" --region "$AWS_REGION" \
                  --query "nodegroup.{status:status,health:health,nodeRole:nodeRole,subnets:subnets}" \
                  --output json 2>/dev/null || echo "nodegroup not found"

                exit 1
              }
          else
            DESIRED=$(aws eks describe-nodegroup \
              --cluster-name "$CLUSTER_NAME" --nodegroup-name "$NODEGROUP_NAME" --region "$AWS_REGION" \
              --query "nodegroup.scalingConfig.desiredSize" --output text 2>/dev/null || echo "0")
            echo "Current desired size: $DESIRED"
            if [ "$DESIRED" -lt 1 ]; then
              echo "Scaling up to 1 nodes..."
              aws eks update-nodegroup-config \
                --cluster-name "$CLUSTER_NAME" --nodegroup-name "$NODEGROUP_NAME" --region "$AWS_REGION" \
                --scaling-config minSize=1,maxSize=2,desiredSize=1
            fi
          fi

          echo "=== Verifying nodegroup before waiting ==="
          aws eks describe-nodegroup \
            --cluster-name "$CLUSTER_NAME" --nodegroup-name "$NODEGROUP_NAME" --region "$AWS_REGION" \
            --query "nodegroup.{status:status,scalingConfig:scalingConfig,nodeRole:nodeRole}" \
            --output json

          echo "=== Waiting for nodegroup to become ACTIVE ==="
          aws eks wait nodegroup-active \
            --cluster-name "$CLUSTER_NAME" \
            --nodegroup-name "$NODEGROUP_NAME" \
            --region "$AWS_REGION" || {
              echo "Nodegroup did not become ACTIVE — diagnostics:"
              aws eks describe-nodegroup \
                --cluster-name "$CLUSTER_NAME" --nodegroup-name "$NODEGROUP_NAME" --region "$AWS_REGION" \
                --query "nodegroup.{status:status,health:health,scalingConfig:scalingConfig,nodeRole:nodeRole,subnets:subnets}" \
                --output json
              exit 1
            }

          echo "=== Polling Kubernetes nodes (up to 15 min) ==="
          for i in $(seq 1 90); do
            READY=$(kubectl get nodes --no-headers 2>/dev/null | awk '$2=="Ready"{c++} END{print c+0}')
            echo "  attempt $i/90 — Ready nodes: $READY"
            [ "$READY" -ge 1 ] && echo "Nodes are Ready - proceeding." && exit 0
            sleep 10
          done

          echo "ERROR: Nodes did not become Ready after 15 minutes"
          kubectl get nodes -o wide || true
          exit 1

      - name: Install AWS Load Balancer Controller
        run: |
          aws eks update-kubeconfig --name $CLUSTER_NAME --region $AWS_REGION

          # IAM policy (idempotent)
          curl -sLo alb-policy.json https://raw.githubusercontent.com/kubernetes-sigs/aws-load-balancer-controller/main/docs/install/iam_policy.json
          aws iam create-policy \
            --policy-name AWSLoadBalancerControllerIAMPolicy \
            --policy-document file://alb-policy.json 2>/dev/null || echo "Policy already exists"

          # IRSA + service account (idempotent)
          eksctl utils associate-iam-oidc-provider \
            --cluster $CLUSTER_NAME --region $AWS_REGION --approve

          eksctl create iamserviceaccount \
            --cluster $CLUSTER_NAME \
            --namespace kube-system \
            --name aws-load-balancer-controller \
            --attach-policy-arn arn:aws:iam::$AWS_ACCOUNT_ID:policy/AWSLoadBalancerControllerIAMPolicy \
            --approve --override-existing-serviceaccounts 2>/dev/null || true

          # Fetch VPC ID
          VPC_ID=$(aws eks describe-cluster \
            --name $CLUSTER_NAME --region $AWS_REGION \
            --query "cluster.resourcesVpcConfig.vpcId" --output text)
          echo "VPC ID: $VPC_ID"

          helm repo add eks https://aws.github.io/eks-charts 2>/dev/null || true
          helm repo update

          # Upgrade-or-install: idempotent across re-runs
          helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
            -n kube-system \
            --set clusterName=$CLUSTER_NAME \
            --set serviceAccount.create=false \
            --set serviceAccount.name=aws-load-balancer-controller \
            --set vpcId=$VPC_ID \
            --set region=$AWS_REGION \
            --set replicaCount=1 \
            --set resources.requests.cpu=100m \
            --set resources.requests.memory=128Mi \
            --set resources.limits.cpu=200m \
            --set resources.limits.memory=256Mi \
            --wait --timeout=20m

      - name: ALB controller status (always)
        if: always()
        run: |
          aws eks update-kubeconfig --name $CLUSTER_NAME --region $AWS_REGION 2>/dev/null || true
          echo "=== Pods ==="
          kubectl get pods -n kube-system -l app.kubernetes.io/name=aws-load-balancer-controller -o wide || true
          echo "=== Logs ==="
          kubectl logs -n kube-system -l app.kubernetes.io/name=aws-load-balancer-controller \
            --tail=50 --all-containers 2>/dev/null || echo "no logs"
          echo "=== Node capacity ==="
          kubectl describe nodes | grep -A 5 "Allocated resources" || echo "no nodes"

      - name: Apply base k8s manifests (idempotent)
        run: |
          aws eks update-kubeconfig --name $CLUSTER_NAME --region $AWS_REGION

          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml

          # Create secret only if it doesn't exist
          kubectl get secret maritime-secret -n maritime 2>/dev/null || \
            kubectl create secret generic maritime-secret \
              --from-literal=POSTGRES_PASSWORD=marine \
              --from-literal=GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} \
              -n maritime

          kubectl apply -f k8s/postgres/
          kubectl apply -f k8s/redis/
          kubectl apply -f k8s/backend/service.yaml
          kubectl apply -f k8s/frontend/service.yaml
          kubectl apply -f k8s/ingress.yaml

  # ── Deploy: build images → push ECR → roll out to EKS ───────────────────────
  deploy:
    needs: [bootstrap]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
      IMAGE_TAG: ${{ github.sha }}
      CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password | \
            docker login --username AWS --password-stdin $ECR_REGISTRY

      - name: Build & push backend
        run: |
          docker build -t $ECR_REGISTRY/marine-backend:$IMAGE_TAG \
                       -t $ECR_REGISTRY/marine-backend:latest ./backend
          docker push $ECR_REGISTRY/marine-backend:$IMAGE_TAG
          docker push $ECR_REGISTRY/marine-backend:latest

      - name: Build & push frontend
        run: |
          docker build -t $ECR_REGISTRY/marine-frontend:$IMAGE_TAG \
                       -t $ECR_REGISTRY/marine-frontend:latest ./frontend
          docker push $ECR_REGISTRY/marine-frontend:$IMAGE_TAG
          docker push $ECR_REGISTRY/marine-frontend:latest

      - name: Deploy to EKS
        run: |
          aws eks update-kubeconfig --name $CLUSTER_NAME --region $AWS_REGION

          BACKEND_IMAGE=$ECR_REGISTRY/marine-backend:$IMAGE_TAG
          FRONTEND_IMAGE=$ECR_REGISTRY/marine-frontend:$IMAGE_TAG

          sed "s|\${BACKEND_IMAGE}|$BACKEND_IMAGE|g" k8s/backend/deployment.yaml | kubectl apply -f -
          sed "s|\${FRONTEND_IMAGE}|$FRONTEND_IMAGE|g" k8s/frontend/deployment.yaml | kubectl apply -f -

          kubectl rollout status deployment/backend -n maritime --timeout=300s
          kubectl rollout status deployment/frontend -n maritime --timeout=300s

      - name: Print public URL
        run: |
          aws eks update-kubeconfig --name $CLUSTER_NAME --region $AWS_REGION
          echo "Waiting for ALB hostname (up to 5 min)..."
          for i in $(seq 1 30); do
            HOSTNAME=$(kubectl get ingress maritime-ingress -n maritime \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")
            if [ -n "$HOSTNAME" ]; then
              echo "App is live at: http://$HOSTNAME"
              exit 0
            fi
            echo "  attempt $i/30 — waiting..."
            sleep 10
          done
          echo "WARNING: ALB hostname not assigned yet — check ingress manually"
          kubectl get ingress -n maritime
