name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Backend: lint + test ──────────────────────────────────────────────────────
  backend-ci:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r backend/requirements-dev.txt
      - name: Lint
        run: ruff check backend/app/ backend/tests/
      - name: Test
        run: pytest backend/tests/ -v
        env:
          REDIS_URL: redis://localhost:6379/0
          DATABASE_URL: ""
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

  # ── Frontend: type-check + build ─────────────────────────────────────────────
  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npx tsc --noEmit
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  # ── Bootstrap: ECR + EKS cluster + ALB controller (skips if already exists) ──
  bootstrap:
    needs: [backend-ci, frontend-ci]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install eksctl
        run: |
          curl -sLO "https://github.com/eksctl-io/eksctl/releases/latest/download/eksctl_Linux_amd64.tar.gz"
          tar -xzf eksctl_Linux_amd64.tar.gz
          sudo mv eksctl /usr/local/bin

      - name: Create ECR repos (idempotent)
        run: |
          aws ecr describe-repositories --repository-names marine-backend 2>/dev/null || \
            aws ecr create-repository --repository-name marine-backend
          aws ecr describe-repositories --repository-names marine-frontend 2>/dev/null || \
            aws ecr create-repository --repository-name marine-frontend

      - name: Create EKS cluster (skip if exists)
        run: |
          if eksctl get cluster --name $CLUSTER_NAME --region $AWS_REGION 2>/dev/null; then
            echo "Cluster already exists — skipping"
          else
            eksctl create cluster \
              --name $CLUSTER_NAME \
              --region $AWS_REGION \
              --nodegroup-name standard \
              --node-type t3.medium \
              --nodes 2 --nodes-min 2 --nodes-max 4 \
              --managed
          fi

      - name: Ensure worker nodes are ready
        run: |
          aws eks update-kubeconfig --name $CLUSTER_NAME --region $AWS_REGION
          echo "=== Current nodes ==="
          kubectl get nodes

          # If no Ready nodes exist, scale up the nodegroup
          READY=$(kubectl get nodes --no-headers 2>/dev/null | grep -c " Ready" || true)
          echo "Ready node count: $READY"

          if [ "$READY" -eq 0 ]; then
            echo "No ready nodes — checking nodegroups..."
            NODEGROUP=$(eksctl get nodegroup \
              --cluster $CLUSTER_NAME --region $AWS_REGION --output json \
              | python3 -c "import sys,json; ngs=json.load(sys.stdin); print(ngs[0]['Name'] if ngs else '')" 2>/dev/null || echo "")

            if [ -n "$NODEGROUP" ]; then
              echo "Scaling nodegroup '$NODEGROUP' back to 2 nodes..."
              eksctl scale nodegroup \
                --cluster $CLUSTER_NAME --region $AWS_REGION \
                --name "$NODEGROUP" --nodes 2 --nodes-min 2 --nodes-max 4
            else
              echo "No nodegroup found — creating one..."
              eksctl create nodegroup \
                --cluster $CLUSTER_NAME --region $AWS_REGION \
                --name standard \
                --node-type t3.medium \
                --nodes 2 --nodes-min 2 --nodes-max 4 \
                --managed
            fi

            echo "Waiting up to 10 min for nodes to be Ready..."
            kubectl wait nodes --all --for=condition=Ready --timeout=600s
          else
            echo "Nodes are healthy — proceeding."
          fi

      - name: Install AWS Load Balancer Controller (skip if exists)
        run: |
          aws eks update-kubeconfig --name $CLUSTER_NAME --region $AWS_REGION

          # IAM policy (idempotent)
          curl -sLo alb-policy.json https://raw.githubusercontent.com/kubernetes-sigs/aws-load-balancer-controller/main/docs/install/iam_policy.json
          aws iam create-policy \
            --policy-name AWSLoadBalancerControllerIAMPolicy \
            --policy-document file://alb-policy.json 2>/dev/null || echo "Policy already exists"

          # IRSA + service account (idempotent)
          eksctl utils associate-iam-oidc-provider \
            --cluster $CLUSTER_NAME --region $AWS_REGION --approve

          eksctl create iamserviceaccount \
            --cluster $CLUSTER_NAME \
            --namespace kube-system \
            --name aws-load-balancer-controller \
            --attach-policy-arn arn:aws:iam::$AWS_ACCOUNT_ID:policy/AWSLoadBalancerControllerIAMPolicy \
            --approve --override-existing-serviceaccounts 2>/dev/null || true

          # Fetch VPC ID — required by newer ALB controller versions
          VPC_ID=$(aws eks describe-cluster \
            --name $CLUSTER_NAME --region $AWS_REGION \
            --query "cluster.resourcesVpcConfig.vpcId" --output text)
          echo "VPC ID: $VPC_ID"

          # Clean slate: uninstall any prior Helm release + force-delete leftover pods
          helm uninstall aws-load-balancer-controller -n kube-system 2>/dev/null || true
          kubectl delete pods -n kube-system \
            -l app.kubernetes.io/name=aws-load-balancer-controller \
            --force --grace-period=0 2>/dev/null || true

          # Wait until no ALB controller pods remain (max 60s)
          for i in {1..30}; do
            count=$(kubectl get pods -n kube-system \
              -l app.kubernetes.io/name=aws-load-balancer-controller \
              --no-headers 2>/dev/null | wc -l)
            [ "$count" -eq 0 ] && break
            sleep 2
          done

          # Fresh Helm install — --wait blocks until deployment is Ready
          helm repo add eks https://aws.github.io/eks-charts 2>/dev/null || true
          helm repo update
          helm install aws-load-balancer-controller eks/aws-load-balancer-controller \
            -n kube-system \
            --set clusterName=$CLUSTER_NAME \
            --set serviceAccount.create=false \
            --set serviceAccount.name=aws-load-balancer-controller \
            --set vpcId=$VPC_ID \
            --set region=$AWS_REGION \
            --set replicaCount=1 \
            --wait --timeout=5m

      - name: ALB controller status (always)
        if: always()
        run: |
          aws eks update-kubeconfig --name $CLUSTER_NAME --region $AWS_REGION
          echo "=== Pods ==="
          kubectl get pods -n kube-system -l app.kubernetes.io/name=aws-load-balancer-controller -o wide
          echo "=== Describe ==="
          kubectl describe pods -n kube-system -l app.kubernetes.io/name=aws-load-balancer-controller | tail -60
          echo "=== Logs ==="
          kubectl logs -n kube-system -l app.kubernetes.io/name=aws-load-balancer-controller --tail=50 --all-containers 2>/dev/null || echo "no logs"
          echo "=== Node capacity ==="
          kubectl top nodes 2>/dev/null || kubectl describe nodes | grep -A 4 "Allocated resources"

      - name: Apply base k8s manifests (idempotent)
        run: |
          aws eks update-kubeconfig --name $CLUSTER_NAME --region $AWS_REGION

          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml

          # Create secret only if it doesn't exist
          kubectl get secret maritime-secret -n maritime 2>/dev/null || \
            kubectl create secret generic maritime-secret \
              --from-literal=POSTGRES_PASSWORD=marine \
              --from-literal=GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} \
              -n maritime

          kubectl apply -f k8s/postgres/
          kubectl apply -f k8s/redis/
          kubectl apply -f k8s/backend/service.yaml
          kubectl apply -f k8s/frontend/service.yaml
          kubectl apply -f k8s/ingress.yaml

  # ── Deploy: build images → push ECR → roll out to EKS ───────────────────────
  deploy:
    needs: [bootstrap]
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
      IMAGE_TAG: ${{ github.sha }}
      CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password | \
            docker login --username AWS --password-stdin $ECR_REGISTRY

      - name: Build & push backend
        run: |
          docker build -t $ECR_REGISTRY/marine-backend:$IMAGE_TAG \
                       -t $ECR_REGISTRY/marine-backend:latest ./backend
          docker push $ECR_REGISTRY/marine-backend:$IMAGE_TAG
          docker push $ECR_REGISTRY/marine-backend:latest

      - name: Build & push frontend
        run: |
          docker build -t $ECR_REGISTRY/marine-frontend:$IMAGE_TAG \
                       -t $ECR_REGISTRY/marine-frontend:latest ./frontend
          docker push $ECR_REGISTRY/marine-frontend:$IMAGE_TAG
          docker push $ECR_REGISTRY/marine-frontend:latest

      - name: Deploy to EKS
        run: |
          aws eks update-kubeconfig --name $CLUSTER_NAME --region $AWS_REGION

          # Apply deployments with real image URLs substituted
          BACKEND_IMAGE=$ECR_REGISTRY/marine-backend:$IMAGE_TAG
          FRONTEND_IMAGE=$ECR_REGISTRY/marine-frontend:$IMAGE_TAG

          sed "s|\${BACKEND_IMAGE}|$BACKEND_IMAGE|g" k8s/backend/deployment.yaml | kubectl apply -f -
          sed "s|\${FRONTEND_IMAGE}|$FRONTEND_IMAGE|g" k8s/frontend/deployment.yaml | kubectl apply -f -

          kubectl rollout status deployment/backend -n maritime --timeout=180s
          kubectl rollout status deployment/frontend -n maritime --timeout=180s

      - name: Print public URL
        run: |
          echo "Waiting for ALB..."
          sleep 30
          kubectl get ingress maritime-ingress -n maritime \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'
