name: Teardown EKS

on:
  workflow_dispatch:

jobs:
  teardown:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install eksctl
        run: |
          curl -sLO "https://github.com/eksctl-io/eksctl/releases/latest/download/eksctl_Linux_amd64.tar.gz"
          tar -xzf eksctl_Linux_amd64.tar.gz
          sudo mv eksctl /usr/local/bin

      - name: Delete k8s resources (ingress first to remove ALB)
        run: |
          aws eks update-kubeconfig --name $CLUSTER_NAME --region $AWS_REGION 2>/dev/null || true
          # Delete ingress first so the ALB is deprovisioned before cluster teardown
          kubectl delete ingress maritime-ingress -n maritime --ignore-not-found --timeout=120s || true
          # Wait for ALB to be fully removed
          echo "Waiting 60s for ALB deprovisioning..."
          sleep 60
          kubectl delete namespace maritime --ignore-not-found --timeout=120s || true

      - name: Uninstall ALB controller Helm release
        run: |
          aws eks update-kubeconfig --name $CLUSTER_NAME --region $AWS_REGION 2>/dev/null || true
          helm uninstall aws-load-balancer-controller -n kube-system 2>/dev/null || echo "already removed"

      - name: Delete EKS nodegroup
        run: |
          eksctl delete nodegroup \
            --cluster $CLUSTER_NAME \
            --region $AWS_REGION \
            --name managed-workers \
            --wait 2>/dev/null || echo "nodegroup not found or already deleted"

      - name: Delete EKS cluster
        run: |
          eksctl delete cluster \
            --name $CLUSTER_NAME \
            --region $AWS_REGION \
            --wait 2>/dev/null || echo "cluster not found or already deleted"

      - name: Delete ECR images (keep repos, clear images)
        run: |
          for repo in marine-backend marine-frontend; do
            IMAGES=$(aws ecr list-images --repository-name $repo --region $AWS_REGION \
              --query 'imageIds[*]' --output json 2>/dev/null || echo "[]")
            if [ "$IMAGES" != "[]" ] && [ "$IMAGES" != "" ]; then
              aws ecr batch-delete-image --repository-name $repo --region $AWS_REGION \
                --image-ids "$IMAGES" 2>/dev/null || true
              echo "Cleared images from $repo"
            fi
          done

      - name: Delete IRSA CloudFormation stack
        run: |
          STACK="eksctl-${CLUSTER_NAME}-addon-iamserviceaccount-kube-system-aws-load-balancer-controller"
          aws cloudformation delete-stack --stack-name "$STACK" --region $AWS_REGION 2>/dev/null || true
          aws cloudformation wait stack-delete-complete --stack-name "$STACK" --region $AWS_REGION 2>/dev/null || true
          echo "IRSA stack cleaned up"

      - name: Summary
        run: |
          echo "Teardown complete. All EKS and associated resources have been removed."
          echo "ECR repositories are retained (empty). Delete manually if not needed."
