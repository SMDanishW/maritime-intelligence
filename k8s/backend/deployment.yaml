apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: maritime
spec:
  replicas: 1
  selector:           
    matchLabels:      
      app: backend    
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ${BACKEND_IMAGE}    # set by CI: ECR_REGISTRY/marine-backend:SHA
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: maritime-config
          env:
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: maritime-secret
                  key: GROQ_API_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
