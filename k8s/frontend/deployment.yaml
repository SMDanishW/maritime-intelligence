apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: maritime
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ${FRONTEND_IMAGE}   # set by CI: ECR_REGISTRY/marine-frontend:SHA
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: BACKEND_URL
              valueFrom:
                configMapKeyRef:
                  name: maritime-config
                  key: BACKEND_URL
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
